stages:
  - build
  - test
  - deploy

image: python:3.11

services:
  - name: docker:24.0.5-dind
    command: ["--tls=false"]

variables:
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""
  PYTHONPATH: "."

before_script:
  - python -V
  - pip install --upgrade pip
  - pip install -r requirements.txt

build-job:
  stage: build
  script:
    - echo "Build stage started"
    - python -m compileall src
    - echo "Build stage completed"

lint-test-job:
  stage: test
  script:
    - flake8 src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics

test:
  stage: test
  script:
    - pytest tests/ -v --ignore=tests/test_neo4j_graph_loading.py --ignore=tests/test_geojson_endpoint.py

unit-test-job:
  stage: test
  script:
    - pytest tests/test_api_endpoints.py tests/test_etl_pipeline_integration.py tests/test_transformation_logic.py -v

deploy-job:
  stage: deploy
  script:
    - echo "Deploy stage completed"
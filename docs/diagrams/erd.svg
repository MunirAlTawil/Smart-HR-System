<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <style>
      .entity { fill:#fdfefe; stroke:#1f618d; stroke-width:2; }
      .entity-title { fill:#ffffff; font-family: Arial, sans-serif; font-size:18px; font-weight:bold; }
      .entity-header { fill:#1f618d; }
      .attribute { font-family: Arial, sans-serif; font-size:16px; fill:#1f618d; }
      .relationship { stroke:#1f618d; stroke-width:2; marker-end:url(#arrowhead); marker-start:url(#circleTail); }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#1f618d"/>
    </marker>
    <marker id="circleTail" markerWidth="10" markerHeight="10" refX="5" refY="5">
      <circle cx="5" cy="5" r="3" fill="#1f618d"/>
    </marker>
  </defs>

  <!-- Users -->
  <rect class="entity" x="60" y="80" width="240" height="220" rx="10"/>
  <rect class="entity-header" x="60" y="80" width="240" height="50" rx="10" ry="10"/>
  <text class="entity-title" x="180" y="110" text-anchor="middle">USERS</text>
  <text class="attribute" x="80" y="150">PK id: int</text>
  <text class="attribute" x="80" y="175">name: string</text>
  <text class="attribute" x="80" y="200">email: string</text>
  <text class="attribute" x="80" y="225">password: string</text>
  <text class="attribute" x="80" y="250">role: enum</text>

  <!-- Candidates -->
  <rect class="entity" x="460" y="80" width="260" height="240" rx="10"/>
  <rect class="entity-header" x="460" y="80" width="260" height="50" rx="10" ry="10"/>
  <text class="entity-title" x="590" y="110" text-anchor="middle">CANDIDATES</text>
  <text class="attribute" x="480" y="150">PK id: int</text>
  <text class="attribute" x="480" y="175">FK user_id: int</text>
  <text class="attribute" x="480" y="200">name: string</text>
  <text class="attribute" x="480" y="225">email: string</text>
  <text class="attribute" x="480" y="250">phone: string</text>
  <text class="attribute" x="480" y="275">resume_path: string</text>
  <text class="attribute" x="480" y="300">approval_status: enum</text>

  <!-- Jobs -->
  <rect class="entity" x="840" y="80" width="260" height="240" rx="10"/>
  <rect class="entity-header" x="840" y="80" width="260" height="50" rx="10" ry="10"/>
  <text class="entity-title" x="970" y="110" text-anchor="middle">JOBS</text>
  <text class="attribute" x="860" y="150">PK id: int</text>
  <text class="attribute" x="860" y="175">title: string</text>
  <text class="attribute" x="860" y="200">description: text</text>
  <text class="attribute" x="860" y="225">location: string</text>
  <text class="attribute" x="860" y="250">skills: json</text>
  <text class="attribute" x="860" y="275">status: enum</text>

  <!-- Applications -->
  <rect class="entity" x="290" y="360" width="280" height="260" rx="10"/>
  <rect class="entity-header" x="290" y="360" width="280" height="50" rx="10" ry="10"/>
  <text class="entity-title" x="430" y="390" text-anchor="middle">APPLICATIONS</text>
  <text class="attribute" x="310" y="430">PK id: int</text>
  <text class="attribute" x="310" y="455">FK job_id: int</text>
  <text class="attribute" x="310" y="480">FK candidate_id: int</text>
  <text class="attribute" x="310" y="505">match_score: float</text>
  <text class="attribute" x="310" y="530">matched_skills: json</text>
  <text class="attribute" x="310" y="555">missing_skills: json</text>
  <text class="attribute" x="310" y="580">status: enum</text>

  <!-- Employees -->
  <rect class="entity" x="640" y="360" width="260" height="220" rx="10"/>
  <rect class="entity-header" x="640" y="360" width="260" height="50" rx="10" ry="10"/>
  <text class="entity-title" x="770" y="390" text-anchor="middle">EMPLOYEES</text>
  <text class="attribute" x="660" y="430">PK id: int</text>
  <text class="attribute" x="660" y="455">FK candidate_id: int</text>
  <text class="attribute" x="660" y="480">FK job_id: int</text>
  <text class="attribute" x="660" y="505">hired_at: date</text>
  <text class="attribute" x="660" y="530">performance_score: float</text>

  <!-- Contacts -->
  <rect class="entity" x="940" y="380" width="240" height="220" rx="10"/>
  <rect class="entity-header" x="940" y="380" width="240" height="50" rx="10" ry="10"/>
  <text class="entity-title" x="1060" y="410" text-anchor="middle">CONTACTS</text>
  <text class="attribute" x="960" y="450">PK id: int</text>
  <text class="attribute" x="960" y="475">name: string</text>
  <text class="attribute" x="960" y="500">email: string</text>
  <text class="attribute" x="960" y="525">subject: string</text>
  <text class="attribute" x="960" y="550">message: text</text>
  <text class="attribute" x="960" y="575">FK handled_by: int</text>

  <!-- Relationships -->
  <line class="relationship" x1="300" y1="200" x2="460" y2="200"/>
  <text class="attribute" x="320" y="190">1</text>
  <text class="attribute" x="430" y="220">0..*</text>

  <line class="relationship" x1="720" y1="200" x2="840" y2="200"/>
  <text class="attribute" x="760" y="190">1</text>
  <text class="attribute" x="820" y="220">0..*</text>

  <line class="relationship" x1="430" y1="360" x2="430" y2="320"/>
  <text class="attribute" x="440" y="330">0..*</text>
  <text class="attribute" x="440" y="360">1</text>

  <line class="relationship" x1="570" y1="450" x2="640" y2="450"/>
  <text class="attribute" x="590" y="440">0..1</text>
  <text class="attribute" x="620" y="470">1</text>

  <line class="relationship" x1="820" y1="450" x2="940" y2="450"/>
  <text class="attribute" x="840" y="440">0..1</text>
  <text class="attribute" x="930" y="470">0..*</text>

  <text class="attribute" x="510" y="215">User owns candidate profile</text>
  <text class="attribute" x="900" y="215">Job receives applications</text>
  <text class="attribute" x="460" y="335">Candidate submits applications</text>
  <text class="attribute" x="740" y="515">Candidate converted to employee</text>
  <text class="attribute" x="940" y="500">HR staff handles inquiries</text>
</svg>


<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2c3e50"/>
    </marker>
    <style>
      .entity { fill:#ecf0f1; stroke:#2c3e50; stroke-width:2; rx:10; ry:10; }
      .system { fill:#d6eaf8; stroke:#2c3e50; stroke-width:2; rx:12; ry:12; }
      text { font-family: Arial, sans-serif; font-size:18px; fill:#2c3e50; }
      .small { font-size:16px; }
    </style>
  </defs>

  <rect class="system" x="330" y="180" width="240" height="140"/>
  <text x="450" y="240" text-anchor="middle">Smart Recruitment</text>
  <text x="450" y="266" text-anchor="middle">System (Laravel)</text>

  <rect class="entity" x="80" y="60" width="200" height="90"/>
  <text x="180" y="110" text-anchor="middle">Candidate</text>

  <rect class="entity" x="80" y="330" width="200" height="90"/>
  <text x="180" y="380" text-anchor="middle">HR Administrator</text>

  <rect class="entity" x="620" y="50" width="220" height="90"/>
  <text x="730" y="95" text-anchor="middle">Python Analysis Service</text>

  <rect class="entity" x="640" y="205" width="200" height="90"/>
  <text x="740" y="245" text-anchor="middle">Database</text>

  <rect class="entity" x="620" y="360" width="220" height="90"/>
  <text x="730" y="405" text-anchor="middle">Email Notification Service</text>

  <line x1="280" y1="105" x2="330" y2="220" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="280" y1="375" x2="330" y2="280" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="570" y1="230" x2="640" y2="250" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="570" y1="270" x2="640" y2="250" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="570" y1="220" x2="620" y2="95" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="620" y1="405" x2="570" y2="300" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="330" y1="240" x2="280" y2="105" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="330" y1="260" x2="280" y2="375" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="640" y1="250" x2="570" y2="250" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="620" y1="95" x2="570" y2="240" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="570" y1="300" x2="620" y2="405" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrowhead)"/>

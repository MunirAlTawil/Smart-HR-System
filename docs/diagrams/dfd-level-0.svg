<svg xmlns="http://www.w3.org/2000/svg" width="920" height="520" viewBox="0 0 920 520">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34495e"/>
    </marker>
    <style>
      .external { fill:#fef5e7; stroke:#34495e; stroke-width:2; rx:10; ry:10; }
      .process { fill:#d4efdf; stroke:#145a32; stroke-width:3; rx:30; ry:30; }
      .datastore { fill:#ebf5fb; stroke:#1f618d; stroke-width:2; }
      .label { font-family: Arial, sans-serif; font-size:18px; fill:#2c3e50; }
      .flow { font-family: Arial, sans-serif; font-size:16px; fill:#2c3e50; }
    </style>
  </defs>

  <rect class="external" x="60" y="80" width="200" height="100"/>
  <text class="label" x="160" y="135" text-anchor="middle">Candidate</text>

  <rect class="external" x="60" y="320" width="220" height="100"/>
  <text class="label" x="170" y="375" text-anchor="middle">HR Administrator</text>

  <ellipse class="process" cx="470" cy="250" rx="170" ry="120"/>
  <text class="label" x="470" y="230" text-anchor="middle">Smart Recruitment</text>
  <text class="label" x="470" y="260" text-anchor="middle">System</text>
  <text class="label small" x="470" y="290" text-anchor="middle">(DFD Level 0)</text>

  <rect class="datastore" x="700" y="130" width="180" height="80" rx="10" ry="10"/>
  <text class="label" x="790" y="170" text-anchor="middle">Database</text>

  <rect class="external" x="700" y="320" width="180" height="90"/>
  <text class="label" x="790" y="365" text-anchor="middle">Python Analysis</text>
  <text class="label" x="790" y="390" text-anchor="middle">Service</text>

  <line x1="260" y1="130" x2="300" y2="205" stroke="#34495e" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text class="flow" x="300" y="170">Application Data</text>

  <line x1="300" y1="295" x2="260" y2="360" stroke="#34495e" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text class="flow" x="280" y="330">Feedback &amp; Status</text>

  <line x1="570" y1="250" x2="700" y2="170" stroke="#1f618d" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text class="flow" x="610" y="215">Read/Write</text>

  <line x1="700" y1="170" x2="570" y2="250" stroke="#1f618d" stroke-width="2.5" marker-end="url(#arrow)"/>

  <line x1="620" y1="320" x2="700" y2="365" stroke="#34495e" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text class="flow" x="650" y="335">CV File</text>

  <line x1="700" y1="365" x2="620" y2="320" stroke="#34495e" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text class="flow" x="660" y="390">Match Result</text>

  <line x1="230" y1="370" x2="300" y2="305" stroke="#34495e" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text class="flow" x="260" y="290">Job Updates</text>
</svg>

